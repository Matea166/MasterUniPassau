services:
  app:
    build:
      context: .
      dockerfile: docker/app/Dockerfile
    container_name: annealbn-ce-app
    working_dir: /workspace
    volumes:
      - .:/workspace
    environment:
      PYTHONPATH: /workspace:/workspace/bnsl-qa:/workspace/bnsl
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nhanes
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/nhanes
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: /bin/bash

  postgres:
    image: postgres:16
    container_name: annealbn-ce-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - annealbn_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
      - ./bnsl/datasets/data:/datasets:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d nhanes"]
      interval: 5s
      timeout: 5s
      retries: 10

  pgweb:
    image: sosedoff/pgweb:latest
    container_name: annealbn-ce-pgweb
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/nhanes?sslmode=disable

volumes:
  annealbn_postgres_data:
